<!DOCTYPE html>
<html>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
<style>
    :root {
        --background: #c7eeff;
        --bg2: #91bed2;
        --element: #0074c1;
        --text1: #222;
        --text2: #1a4e67;
        --highlight: #0099ff;
        user-select: none;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --background: #131c24;
            --bg2: #1f2f3e;
            --element: #005cad;
            --text1: #afe8f2;
            --text2: #56b7e4;

        }
    }

    body {
        background-color: var(--background);
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    #main {
        display: flex;
        align-items: center;
        flex-direction: column;
    }

    * {
        color: var(--text1);
    }

    label {
        cursor: pointer;
        font-family: 'Roboto Mono', monospace;
        font-weight: 700;
        font-size: 2em;
        transition: ease-out;
        transition-duration: 0.2s;
        transition-property: color;
        background-color: var(--text1);
        color: var(--background);
        padding: 1rem 2.5rem;
        border-radius: 1rem;
        margin: 8px;
    }

    @media (prefers-reduced-motion: reduce) {
        label {
            transition: none;
        }
    }

    label:focus {
        outline: solid 2px var(--element);
    }

    label:hover,
    label:focus {
        color: var(--highlight);
    }

    input {
        display: none;
    }

    #fileNameDisplay {
        font-family: 'Roboto Mono', monospace;
        font-size: 1.5rem;
        margin: .5rem;
    }

    #outer {
        width: 100vw;
        flex: 1;
        overflow: hidden;
    }

    #module {
        width: calc(100% - 20px);
        height: calc(100% - 20px);
        background-color: var(--bg2);
        margin: 10px;
        border-radius: 10px;
        outline: 4px solid var(--element);
    }

    #typedisplay {
        position: absolute;
        display: flex;
        flex-direction: row;
        height: 6rem;
        margin: 1rem;
    }

    .logo {
        display: none;
    }
</style>

<body>
    <div id="main">
        <input type="file" id="fileInput" accept=".json">
        <label for="fileInput" tabindex="0" role="button">Choose JSON Module</label>
        <span id="fileNameDisplay">No file chosen</span>
    </div>
    <div id="outer">
        <div id="module">

        </div>
    </div>

    <div id="typedisplay">
        <img class="logo" id="LSDJ" src="LSDJ.svg" />
        <img class="logo" id="Furnace" src="Furnace.svg" />
    </div>
</body>
<script src="apuapi.js"></script>
<script>

    function displaytype(type) {
        const lsdjLogo = document.getElementById("LSDJ");
        const furnaceLogo = document.getElementById("Furnace");

        // Hide both first
        lsdjLogo.style.display = "none";
        furnaceLogo.style.display = "none";

        switch (type) {
            case 0: // Furnace
                furnaceLogo.style.display = "block";
                break;
            case 1: // LSDJ
                lsdjLogo.style.display = "block";
                break;
            default: // Unknown or unsupported
                // No display
                break;
        }
    }



    let module;

    document.getElementById('fileInput').addEventListener('change', function (event) {
        const file = event.target.files[0];
        if (!file) return;

        document.getElementById('fileNameDisplay').textContent = file.name;

        const reader = new FileReader();
        reader.onload = function (e) {
            try {
                module = JSON.parse(e.target.result);
                // module is now loaded and ready to use
                handleload()
            } catch (err) {
                alert("Invalid JSON")
                console.error('Invalid JSON:', err);
                displaytype(-1)
            }
        };
        reader.readAsText(file);
    });

    function handleload() {
        displaytype(module["PlayerType"])
        if (!("PlayerType" in module)) {
            alert("Not a valid JSON Module");
        }
    }

</script>
<script>
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.querySelector('label[for="fileInput"]');

    fileLabel.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault(); // Prevent scrolling on Space
            fileInput.click();  // Manually trigger file picker
        }
    });
</script>

</html>
