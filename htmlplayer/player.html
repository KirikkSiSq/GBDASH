<!DOCTYPE html>
<html>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
<style>
    :root {
        --background: #c7eeff;
        --bg2: #93c0d3;
        --element: #0074c1;
        --text1: #222;
        --text2: #1a4e67;
        --highlight: #0099ff;
        user-select: none;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --background: #131c24;
            --bg2: #223343;
            --element: #005cad;
            --text1: #afe8f2;
            --text2: #56b7e4;

        }
    }



    body {
        background-color: var(--background);
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }

    #main {
        display: flex;
        align-items: center;
        flex-direction: column;
    }

    * {
        color: var(--text1);
        font-family: 'Roboto Mono', monospace;
    }

    label {
        cursor: pointer;
        font-family: 'Roboto Mono', monospace;
        font-weight: 700;
        font-size: 2em;
        transition: ease-out;
        transition-duration: 0.2s;
        transition-property: color;
        background-color: var(--text1);
        color: var(--background);
        padding: 1rem 2.5rem;
        border-radius: 1rem;
        margin: 8px;
    }

    @media (prefers-reduced-motion: reduce) {
        label {
            transition: none;
        }
    }

    label:focus {
        outline: solid 2px var(--element);
    }

    label:hover,
    label:focus {
        color: var(--highlight);
    }

    input {
        display: none;
    }

    #fileNameDisplay {
        font-size: 1.5rem;
        margin: .5rem;
    }

    #outer {
        width: 100vw;
        flex: 1;
        overflow: hidden;
    }

    #module {
        width: calc(100% - 20px);
        height: calc(100% - 20px);
        background-color: var(--bg2);
        margin: 10px;
        border-radius: 10px;
        outline: 4px solid var(--element);
    }

    #typedisplay {
        position: absolute;
        display: flex;
        flex-direction: row;
        height: 6rem;
        margin: 1rem;
    }

    .logo {
        display: none;
    }

    @media (forced-colors: active) {
        label {
            background-color: ButtonFace;
            color: ButtonText;
            transition: none;
            border: 2px solid ButtonBorder;
        }

        label:hover {
            color: LinkText;
        }
    }

    .trackerdisplay {
        width: 100%;
        height: 100%;
        display: none;
        padding: 2px;
    }

    #FmtLSDJ {
        display: block;
    }
</style>

<body>
    <div id="main">
        <input type="file" id="fileInput" accept=".json">
        <label for="fileInput" tabindex="0" role="button">Choose JSON Module</label>
        <span id="fileNameDisplay">No file chosen</span>
    </div>
    <div id="outer">
        <div id="module">
            <div class="trackerdisplay" id="FmtLSDJ">
                <span id="LSDSpeed">Speed 6:6 @ 60hz/150bpm, Groove 0</span>
            </div>
            <div class="trackerdisplay" id="FmtFUR"></div>
        </div>
    </div>

    <div id="typedisplay">
        <img class="logo" id="LSDJ" src="LSDJ.svg" />
        <img class="logo" id="Furnace" src="Furnace.svg" />
    </div>
</body>
<script src="apuapi.js"></script>
<script src="loadhandler.js"></script>
<script src="lsdjhandler.js"></script>
<script src="furnacehandler.js"></script>
<script>
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.querySelector('label[for="fileInput"]');

    fileLabel.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault(); // Prevent scrolling on Space
            fileInput.click();  // Manually trigger file picker
        }
    });
</script>
</html>
