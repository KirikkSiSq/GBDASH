name: Build ROM and Music

on:
  push:
    paths:
      - 'src/**'
      - 'makefile'
      - 'music/**'
      - 'processers/**'
      - '*'
  pull_request:
    paths:
      - 'src/**'
      - 'makefile'
      - 'music/**'
      - 'processers/**'
      - '*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Process Music Files
        run: |
          python processtotxt.py
          python TXTtoJSON.py

      - name: Upload Processed Music
        uses: actions/upload-artifact@v4
        with:
          name: Processed Music
          path: music/

      - name: Compile GameBoy ROM
        run: |
          & ".\build.bat"

      - name: Upload GameBoy ROM
        uses: actions/upload-artifact@v4
        with:
          name: ROM
          path: build/
