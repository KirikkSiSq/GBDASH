name: Build ROM

on:
  push:
    paths:
      - 'src/**'
      - 'include/**'
      - 'makefile'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'makefile'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies and GBDK
        run: |
          sudo apt update
          sudo apt install -y wget unzip
          wget https://github.com/gbdk-2020/gbdk-2020/releases/latest/download/gbdk-linux64.tar.gz
          tar -xzf gbdk-linux64.tar.gz
          sudo mv gbdk /opt/gbdk
          echo "GBDKDIR=/opt/gbdk" >> $GITHUB_ENV
          echo "/opt/gbdk/bin" >> $GITHUB_PATH

      - name: Make tools executable
        run: |
          chmod +x processers/LSDJ/lsdj2txt
          chmod +x processers/FUR/furnace

      - name: Compile GameBoy ROM
        run: |
          make

      - name: Upload GameBoy ROM
        uses: actions/upload-artifact@v4
        with:
          name: ROM
          path: build/game.gb
