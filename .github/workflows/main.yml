name: Build GBDASH

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GBDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip make
          wget https://github.com/gbdk-2020/gbdk-2020/releases/latest/download/gbdk-linux64.tar.gz
          tar -xzf gbdk-linux64.tar.gz
          sudo mv gbdk /opt/gbdk
          # Set environment variables for the build process
          echo "GBDK=/opt/gbdk" >> $GITHUB_ENV
          echo "/opt/gbdk/bin" >> $GITHUB_PATH

      - name: Verify GBDK
        run: |
          echo "GBDK path: $GBDK"
          /opt/gbdk/bin/lcc -v

      - name: Build ROM
        run: make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GBDASH
          path: bin/GBDASH.gb

      - name: Nightly Release
        if: github.ref == 'refs/heads/Soteris24_Branch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          files: bin/GBDASH.gb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
